name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      # Hard rule: no em-dashes (U+2014) or en-dashes (U+2013) in shipped files.
      - name: No em/en dashes
        run: |
          python3 - <<'PY'
          import glob, sys
          pats = ['fahad-ai-shopping-assistant-for-woocommerce.php','uninstall.php','readme.txt',
                  'includes/**/*.php','assets/**/*.js','assets/**/*.css','website/**/*.html','docs/**/*.md']
          bad = []
          for pat in pats:
              for f in glob.glob(pat, recursive=True):
                  t = open(f, encoding='utf-8', errors='ignore').read()
                  if '—' in t or '–' in t:
                      bad.append(f)
          if bad:
              print('Fancy dash (em/en) found, use a comma or plain hyphen:')
              for f in bad: print('  -', f)
              sys.exit(1)
          print('OK: no em/en dashes')
          PY

      # Run the suites separately so each shows up as its own step in the log.
      - name: Unit suite (parallel)
        run: composer test

      - name: Eval suite (golden-conversation tests)
        run: vendor/bin/phpunit --testsuite eval --testdox
