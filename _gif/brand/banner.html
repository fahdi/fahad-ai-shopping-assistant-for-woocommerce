<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{--ink:#0c0d10;--paper:#f3efe6;--paper-soft:#c7c3b8;--lime:#d6fb4f;--lime-deep:#aee02a;--rose:#ff6b5e}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1544px;height:500px;overflow:hidden;background:#000}
  .stage{position:relative;width:1544px;height:500px;overflow:hidden;
    background:
      radial-gradient(70% 130% at 14% 42%, #17191d 0%, #0f1013 46%, #0a0b0d 100%),
      radial-gradient(50% 120% at 92% 88%, rgba(214,251,79,.10), transparent 60%);
  }
  .grain{position:absolute;inset:0;opacity:.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='140' height='140' filter='url(%23n)'/></svg>");}

  /* ---- logo mark (lime core + sonar rings) ---- */
  .mark{position:absolute;left:214px;top:250px;width:0;height:0}
  .ring{position:absolute;left:0;top:0;border-radius:50%;border:3px solid var(--lime);transform:translate(-50%,-50%)}
  .ring-base{position:absolute;left:0;top:0;width:196px;height:196px;border-radius:50%;
    border:3px solid rgba(214,251,79,.26);transform:translate(-50%,-50%)}
  .glow{position:absolute;left:0;top:0;width:200px;height:200px;transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle, rgba(214,251,79,.4), rgba(214,251,79,.1) 42%, transparent 68%);filter:blur(2px)}
  .core{position:absolute;left:0;top:0;width:126px;height:126px;transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle at 42% 38%, #eaff7a 0%, var(--lime) 46%, var(--lime-deep) 100%);
    box-shadow:0 6px 24px rgba(174,224,42,.35), inset 0 3px 8px rgba(255,255,255,.4), inset 0 -8px 16px rgba(120,150,10,.35)}

  /* ---- text lockup ---- */
  .lock{position:absolute;left:430px;top:50%;transform:translateY(-50%)}
  .word{display:flex;align-items:center;gap:16px;font-family:'Fraunces',Georgia,serif;font-weight:600;
    font-size:44px;letter-spacing:-.02em;color:var(--paper)}
  .word .dot{width:16px;height:16px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 6px rgba(214,251,79,.16)}
  .tag{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:74px;line-height:1.04;letter-spacing:-.02em;
    color:var(--paper);margin-top:18px}
  .hl{position:relative;z-index:0;color:var(--ink);white-space:nowrap;padding:0 .12em}
  .hl .swipe{position:absolute;left:-.02em;right:-.02em;top:.08em;bottom:.2em;background:var(--lime);
    border-radius:7px;z-index:-1;box-shadow:0 6px 22px rgba(214,251,79,.32)}
  .kick{font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:500;font-size:20px;letter-spacing:3px;
    text-transform:uppercase;color:var(--paper-soft);margin-top:30px}
  .kick b{color:var(--lime);font-weight:500}
</style>
</head>
<body>
  <div class="stage">
    <div class="mark">
      <div class="ring-base"></div>
      <div class="ring" id="r0"></div><div class="ring" id="r1"></div><div class="ring" id="r2"></div>
      <div class="glow" id="glow"></div>
      <div class="core" id="core"></div>
    </div>

    <div class="lock">
      <div class="word"><span class="dot"></span>Dukandaar</div>
      <div class="tag">the <span class="hl">honest<span class="swipe" id="swipe"></span></span> WooCommerce<br>shopping assistant</div>
      <div class="kick">Grounded in your store data <b>·</b> 13+ AI providers</div>
    </div>

    <div class="grain"></div>
  </div>
<script>
  const TAU=Math.PI*2;
  const rings=[document.getElementById('r0'),document.getElementById('r1'),document.getElementById('r2')];
  const core=document.getElementById('core'), glow=document.getElementById('glow'), swipe=document.getElementById('swipe');
  const MIN=126, MAX=300;
  const easeOut=x=>1-Math.pow(1-x,3);
  window.__draw=function(t){
    const b=0.5+0.5*Math.sin(t*TAU);
    core.style.transform=`translate(-50%,-50%) scale(${1+0.035*Math.sin(t*TAU)})`;
    glow.style.opacity=(0.5+0.4*b).toFixed(3);
    glow.style.transform=`translate(-50%,-50%) scale(${0.9+0.16*b})`;
    rings.forEach((el,i)=>{
      const p=(t+i/3)%1, d=MIN+(MAX-MIN)*p;
      const op=(p<0.12? p/0.12 : 1-((p-0.12)/0.88))*0.55;
      el.style.width=d+'px'; el.style.height=d+'px';
      el.style.opacity=Math.max(0,op).toFixed(3);
      el.style.borderWidth=Math.max(1,3*(1-p*0.7)).toFixed(2)+'px';
    });
    // "honest" is highlighted with a static lime marker (dark ink on lime) so
    // the word stays fully legible in every frame; motion lives in the sonar
    // rings + core pulse above. (Previously a growing bar covered the letters.)
  };
  window.__ready=true;
  let s=performance.now();
  (function loop(now){window.__draw(((now-s)/4000)%1);requestAnimationFrame(loop);})(performance.now());
</script>
</body>
</html>
